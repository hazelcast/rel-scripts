name: Validate Python

on:
  pull_request:
    paths:
      - '.github/python/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: psf/black@d2490e24dad33b8f68c77602ee29160de0fea24b # 26.5.0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip3 install pytest
          pip3 install -r .github/python/add-release/requirements.txt

      - name: Run tests
        run: |
          pytest .github/python/add-release/tests
