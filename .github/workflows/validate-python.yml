name: Validate Python

on:
  pull_request:
    paths:
      - '.github/python/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip3 install pytest
          pip3 install -r .github/python/add-release/requirements.txt

      - name: Run tests
        run: |
          pytest .github/python/add-release/tests
